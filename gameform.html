<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Character Form</title>

    <link rel="stylesheet" href="gameform.css">
</head>

<body>

    <header>
        <h1>Game Character Creator</h1>
    </header>

    <main>

        <div>
            <label for="txtUsername">Username:</label>
            <input type="text" id="txtUsername">
        </div>

        <br>

        <div>
            <label for="txtWeapon">Weapon:</label>
            <input type="text" id="txtWeapon">
        </div>

        <br>

        <div>
            <label for="txtHealth">Health/Damage:</label>
            <input type="number" id="txtHealth">
        </div>

        <br>

        <div>
            <label for="txtPoints">Point Total:</label>
            <input type="number" id="txtPoints">
        </div>

        <br>

        <button onclick="displayCharacter()">Submit</button>

        <h2>Character Information</h2>

        <div id="output">
            Character information will appear here.
        </div>

    </main>

    <script src="gameform.js"></script>

</body>
</html>
